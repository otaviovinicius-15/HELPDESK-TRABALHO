<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <title>Sistema de Chamados</title>
</head>
<body>
    <header>
        <div class="cabecalho_pagina">
            <h1 id="titulo_cabecalho">HelpDesk Pro</h1>
            <p id="txt_login">Sistema de Gerenciamento de Chamados</p>
        </div>
    </header>

    <div class="login_user">
        <h2 id="titulo_login">Acesse sua conta</h2>

        <form id="form_login">
            <label>E-mail</label>
            <div class="input-box">
                <input type="email" placeholder="seu@email.com">
            </div>
        
            <label>Senha</label>
            <div class="input-box">
                <input type="password" placeholder="********">
            </div>

            <button id="botao_entrar">Entrar</button>
        </form>
    </div>
</body>
</html>
